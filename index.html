<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENTHRA AI</title>
    <style>
        /* Msingi wa muonekano */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0f172a; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar ya rangi Nyekundu kama ulivyotaka */
        .top-bar {
            background: #CC0000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Sehemu ya Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; }
        .user { align-self: flex-end; flex-direction: row; }
        .bot { align-self: flex-start; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #CC0000; object-fit: cover; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user .bubble { background: #CC0000; color: white; border-bottom-right-radius: 2px; }
        .bot .bubble { background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 2px; border: 1px solid #334155; }

        /* Loading Animation */
        .dots { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 8px; height: 8px; background: #CC0000; border-radius: 50%; animation: pulse 1s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Sehemu ya chini ya kuandikia */
        .bottom-bar {
            background: #1e293b;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }

        button {
            background: #CC0000;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* Style za Markdown codes */
        pre { background: #000; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
        code { font-family: 'Courier New', monospace; color: #facc15; }
    </style>
</head>
<body>

    <div class="top-bar">ZENTHRA AI</div>

    <div class="chat-container" id="chat-content">
        </div>

    <form id="chat-form" class="bottom-bar">
        <input id="user-input" type="text" placeholder="Type your message..." autocomplete="off">
        <button type="submit">Send</button>
    </form>

    <script>
        const chatContent = document.getElementById("chat-content");
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");

        const chatGPTLogo = "https://i.postimg.cc/wBFCjs4L/IMG-20251121-WA0005.jpg";
        const userLogo = "https://i.postimg.cc/wBFCjs4L/IMG-20251121-WA0005.jpg";

        function parseMarkdown(text) {
            text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br/>');
            return text;
        }

        function createMessageElement(message, fromUser, isLoading = false) {
            const messageWrapper = document.createElement("div");
            messageWrapper.classList.add("message", fromUser ? "user" : "bot");

            const avatar = document.createElement("img");
            avatar.src = fromUser ? userLogo : chatGPTLogo;
            avatar.classList.add("avatar");

            const bubble = document.createElement("div");
            if (isLoading) {
                bubble.innerHTML = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            } else {
                bubble.classList.add("bubble");
                bubble.innerHTML = parseMarkdown(message);
            }

            if (fromUser) {
                messageWrapper.appendChild(bubble);
                messageWrapper.appendChild(avatar);
            } else {
                messageWrapper.appendChild(avatar);
                messageWrapper.appendChild(bubble);
            }

            return messageWrapper;
        }

        // Hapa ndio API yako uliyoiomba
        async function fetchResponse(userMessage) {
            try {
                const response = await fetch("https://backend.buildpicoapps.com/aero/run/llm-api?pk=v1-Z0FBQUFBQm5IZkJDMlNyYUVUTjIyZVN3UWFNX3BFTU85SWpCM2NUMUk3T2dxejhLSzBhNWNMMXNzZlp3c09BSTR6YW1Sc1BmdGNTVk1GY0liT1RoWDZZX1lNZlZ0Z1dqd3c9PQ==", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        prompt: userMessage
                    })
                });

                if (!response.ok) return "Hitilafu imetokea kwenye server. Jaribu tena.";

                const data = await response.json();
                if (data.status === "success") {
                    return data.text;
                } else {
                    return "AI imeshindwa kujibu kwa sasa.";
                }
            } catch (error) {
                return "Kuna shida ya mtandao. Hakikisha upo connected.";
            }
        }

        chatForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const userMessage = userInput.value.trim();
            if (!userMessage) return;

            chatContent.appendChild(createMessageElement(userMessage, true));
            userInput.value = "";

            const loadingMessage = createMessageElement("", false, true);
            chatContent.appendChild(loadingMessage);
            chatContent.scrollTop = chatContent.scrollHeight;

            const botResponse = await fetchResponse(userMessage);

            chatContent.removeChild(loadingMessage);
            chatContent.appendChild(createMessageElement(botResponse, false));
            chatContent.scrollTop = chatContent.scrollHeight;
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                const welcomeMessage = createMessageElement("Vipi mwanangu! Mimi ni Zenthra AI. Nikupe mchongo gani leo?", false);
                chatContent.appendChild(welcomeMessage);
                chatContent.scrollTop = chatContent.scrollHeight;
            }, 500);
        });
    </script>
</body>
</html>
